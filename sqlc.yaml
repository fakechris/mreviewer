version: "2"
sql:
  - engine: "mysql"
    queries: "internal/db/queries/"
    schema: "migrations/"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - column: "review_runs.scope_json"
            go_type:
              type: "NullRawMessage"
          - db_type: "bigint"
            go_type: "int64"
          - db_type: "timestamp"
            go_type: "time.Time"
          - db_type: "datetime"
            go_type: "time.Time"
