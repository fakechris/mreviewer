# Advanced configuration template for mreviewer.
# Environment variables in this file are expanded at startup, so `${VAR}` syntax is supported.

app_env: production
port: "3100"

# Use SQLite for single-machine deployments or keep MySQL/Redis from docker-compose.
# database_dsn: "file:/data/mreviewer.db?_pragma=busy_timeout(5000)"

gitlab_base_url: ${GITLAB_BASE_URL}
gitlab_token: ${GITLAB_TOKEN}
gitlab_webhook_secret: ${GITLAB_WEBHOOK_SECRET}

llm:
  default_route: minimax-review
  fallback_route: claude-sonnet-4-6
  routes:
    minimax-review:
      provider: minimax
      base_url: ${MINIMAX_BASE_URL}
      api_key: ${MINIMAX_API_KEY}
      model: ${MINIMAX_MODEL}
      output_mode: tool_call
      max_tokens: 4096
      temperature: 0.2
    claude-sonnet-4-6:
      provider: anthropic
      base_url: ${ANTHROPIC_BASE_URL}
      api_key: ${ANTHROPIC_API_KEY}
      model: ${ANTHROPIC_MODEL}
      output_mode: tool_call
      max_tokens: 12000
      temperature: 0.2
    openai-gpt-5-4:
      provider: openai
      base_url: ${OPENAI_BASE_URL}
      api_key: ${OPENAI_API_KEY}
      model: gpt-5.4
      output_mode: json_schema
      max_completion_tokens: 12000
      reasoning_effort: medium
      temperature: 0.2
