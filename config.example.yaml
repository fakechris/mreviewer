# Advanced configuration template for mreviewer.
# Environment variables in this file are expanded at startup, so `${VAR}` syntax is supported.

app_env: production
port: "3100"

# Use SQLite for single-machine deployments or keep MySQL/Redis from docker-compose.
# database_dsn: "file:/data/mreviewer.db?_pragma=busy_timeout(5000)"

gitlab_base_url: ${GITLAB_BASE_URL}
gitlab_token: ${GITLAB_TOKEN}
gitlab_webhook_secret: ${GITLAB_WEBHOOK_SECRET}

github_base_url: ${GITHUB_BASE_URL}
github_token: ${GITHUB_TOKEN}
github_webhook_secret: ${GITHUB_WEBHOOK_SECRET}

models:
  minimax_reasoning:
    provider: minimax
    base_url: ${MINIMAX_BASE_URL}
    api_key: ${MINIMAX_API_KEY}
    model: MiniMax-M2.7-highspeed
    output_mode: tool_call
    max_tokens: 4096
    temperature: 0.2
  claude_backup:
    provider: anthropic
    base_url: ${ANTHROPIC_BASE_URL}
    api_key: ${ANTHROPIC_API_KEY}
    model: claude-sonnet-4-6
    output_mode: tool_call
    max_tokens: 12000
    temperature: 0.2
  openai_advisor:
    provider: openai
    base_url: ${OPENAI_BASE_URL}
    api_key: ${OPENAI_API_KEY}
    model: gpt-5.4
    output_mode: json_schema
    max_completion_tokens: 12000
    reasoning_effort: medium
    temperature: 0.2
  # Prefer tool_call for Zhipu GLM-5/GLM-5.1.
  # 2026-04-10 live probes showed json_schema strict=true can still return plain text on this endpoint.
  # zhipu_glm5:
  #   provider: zhipuai
  #   base_url: ${ZHIPUAI_BASE_URL}
  #   api_key: ${ZHIPUAI_API_KEY}
  #   model: glm-5
  #   output_mode: tool_call
  #   max_tokens: 12000
  #   temperature: 0.2
  # doubao_turbo:
  #   provider: ark_openai
  #   base_url: https://ark.cn-beijing.volces.com/api/coding/v3
  #   api_key: ${ARK_TOKEN}
  #   model: doubao-seed-2.0-code
  #   output_mode: tool_call
  #   max_tokens: 4096
  #   temperature: 0.2
  # kimi_turbo:
  #   provider: fireworks_router
  #   base_url: https://api.fireworks.ai/inference
  #   api_key: ${FIREWORKS_API_KEY}
  #   model: accounts/fireworks/routers/kimi-k2p5-turbo
  #   output_mode: tool_call
  #   max_tokens: 4096
  #   temperature: 0.2

model_chains:
  review_primary:
    primary: minimax_reasoning
    fallbacks:
      - claude_backup
  advisor_primary:
    primary: openai_advisor
    fallbacks:
      - claude_backup

review:
  model_chain: review_primary
  advisor_chain: advisor_primary
  packs:
    - security
    - architecture
    - database
