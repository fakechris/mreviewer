name: Release CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to publish (for example v1.2.3)
        required: true
        type: string

jobs:
  build-cli:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Validate release version
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "release version must match vMAJOR.MINOR.PATCH[-PRERELEASE] (got: $VERSION)" >&2
            exit 1
          fi

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ env.VERSION }}
        run: |
          mkdir -p dist
          out_dir="dist/mreviewer_${VERSION#v}_${GOOS}_${GOARCH}"
          mkdir -p "$out_dir"
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "$out_dir/mreviewer" ./cmd/mreviewer
          tar -C "$out_dir" -czf "dist/mreviewer_${VERSION#v}_${GOOS}_${GOARCH}.tar.gz" mreviewer
          shasum -a 256 "dist/mreviewer_${VERSION#v}_${GOOS}_${GOARCH}.tar.gz" | awk '{print $1}' > "dist/mreviewer_${VERSION#v}_${GOOS}_${GOARCH}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish-release:
    runs-on: ubuntu-latest
    needs: build-cli
    permissions:
      actions: write
      contents: write
      pull-requests: write
    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          find dist -mindepth 2 -type f -exec mv {} dist/ \;

      - name: Generate consolidated checksums
        run: |
          : > dist/checksums.txt
          for archive in dist/mreviewer_${VERSION#v}_*.tar.gz; do
            checksum_file="${archive%.tar.gz}.sha256"
            checksum="$(cat "$checksum_file")"
            printf "%s  %s\n" "$checksum" "$(basename "$archive")" >> dist/checksums.txt
          done

      - name: Generate Homebrew formula
        run: |
          darwin_amd64_sha="$(cat dist/mreviewer_${VERSION#v}_darwin_amd64.sha256)"
          darwin_arm64_sha="$(cat dist/mreviewer_${VERSION#v}_darwin_arm64.sha256)"
          linux_amd64_sha="$(cat dist/mreviewer_${VERSION#v}_linux_amd64.sha256)"
          linux_arm64_sha="$(cat dist/mreviewer_${VERSION#v}_linux_arm64.sha256)"
          mkdir -p dist/formula
          bash scripts/render-homebrew-formula.sh "$VERSION" "$darwin_amd64_sha" "$darwin_arm64_sha" "$linux_amd64_sha" "$linux_arm64_sha" > dist/formula/mreviewer.rb

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/checksums.txt
            dist/formula/mreviewer.rb

      - name: Prepare Homebrew formula sync branch
        id: formula_sync
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="release/formula-${VERSION}"
          git fetch origin main
          git fetch origin "$branch" || true
          if git show-ref --verify --quiet "refs/remotes/origin/$branch"; then
            git checkout -B "$branch" "origin/$branch"
          else
            git checkout -B "$branch" origin/main
          fi
          mkdir -p Formula
          cp dist/formula/mreviewer.rb Formula/mreviewer.rb
          if [[ -z "$(git status --porcelain -- Formula/mreviewer.rb)" ]]; then
            echo "branch=$branch" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mreviewer.rb
          git commit -m "chore: update brew formula for ${VERSION}"
          git push --force-with-lease origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Open Homebrew formula sync PR
        if: steps.formula_sync.outputs.branch != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="${{ steps.formula_sync.outputs.branch }}"
          existing="$(gh pr list --head "$branch" --base main --state open --json number --jq '.[0].number // empty')"
          if [[ -n "$existing" ]]; then
            exit 0
          fi
          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore: update brew formula for ${VERSION}" \
            --body "Automated Homebrew formula sync generated from release ${VERSION}."

      - name: Trigger CI for Homebrew formula sync branch
        if: steps.formula_sync.outputs.branch != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="${{ steps.formula_sync.outputs.branch }}"
          gh workflow run CI --ref "$branch"
