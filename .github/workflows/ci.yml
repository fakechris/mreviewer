name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...

    - name: Script Tests
      run: |
        bash scripts/init-local-env_test.sh
        bash scripts/review-mr_test.sh
        bash scripts/verify-onboarding.sh
        bash scripts/verify-onboarding_test.sh
