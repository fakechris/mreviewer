# Default configuration for the MR review system.
# Environment variables override all values below.

app_env: development
port: "3100"

mysql_dsn: "mreviewer:mreviewer_password@tcp(127.0.0.1:3306)/mreviewer?parseTime=true&loc=UTC&charset=utf8mb4&collation=utf8mb4_unicode_ci"
redis_addr: "127.0.0.1:6380"

gitlab_base_url: "https://gitlab.example.com"
gitlab_token: ""
gitlab_webhook_secret: ""

anthropic_base_url: "https://api.minimaxi.com/anthropic"
anthropic_api_key: ""
anthropic_model: "MiniMax-M2.7-highspeed"

llm:
  default_route: ark-anthropic
  fallback_route: ark-openai
  routes:
    ark-anthropic:
      provider: ark_anthropic
      base_url: https://ark.cn-beijing.volces.com/api/coding
      api_key: ***REMOVED***
      model: kimi-k2.5
      output_mode: tool_call
      max_tokens: 8192
      temperature: 0.2
    ark-openai:
      provider: ark_openai
      base_url: https://ark.cn-beijing.volces.com/api/coding/v3
      api_key: ***REMOVED***
      model: deepseek-v3.2
      output_mode: tool_call
      max_tokens: 8192
      temperature: 0.2
