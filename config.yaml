# Default configuration for the MR review system.
# Environment variables override all values below.

app_env: development
port: "3100"

mysql_dsn: "mreviewer:mreviewer_password@tcp(127.0.0.1:3306)/mreviewer?parseTime=true&loc=UTC&charset=utf8mb4&collation=utf8mb4_unicode_ci"
redis_addr: "127.0.0.1:6380"

gitlab_base_url: "https://gitlab.example.com"
gitlab_token: ""
gitlab_webhook_secret: ""

# Single-provider quick-start contract:
# - Preferred for the equal quick-start path shared by MiniMax / Anthropic / OpenAI.
# - Use environment variables so the same docker-compose flow works across providers:
#   LLM_PROVIDER=minimax|anthropic|openai
#   LLM_API_KEY=...
#   LLM_BASE_URL=...
#   LLM_MODEL=...
# - Route-based `llm.routes` below remains the advanced path.
llm_provider: ""
llm_api_key: ""
llm_base_url: ""
llm_model: ""

anthropic_base_url: "https://api.minimaxi.com/anthropic"
anthropic_api_key: ""
anthropic_model: "MiniMax-M2.7-highspeed"

# Optional runtime defaults for the portable review council:
# review_packs:
#   - security
#   - architecture
#   - database
# review_advisor_route: "openai-gpt-5-4"
# review_compare_reviewers:
#   - github:gemini
#   - gitlab:coderabbit

