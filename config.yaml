# Default configuration for the MR review system.
# Environment variables override all values below.

app_env: development
port: "3100"

mysql_dsn: "mreviewer:mreviewer_password@tcp(127.0.0.1:3306)/mreviewer?parseTime=true&loc=UTC&charset=utf8mb4&collation=utf8mb4_unicode_ci"
redis_addr: "127.0.0.1:6380"

gitlab_base_url: "https://gitlab.example.com"
gitlab_token: ""
gitlab_webhook_secret: ""
github_base_url: "https://github.com"
github_token: ""
github_webhook_secret: ""

anthropic_base_url: "https://api.minimaxi.com/anthropic"
anthropic_api_key: ""
anthropic_model: "MiniMax-M2.7-highspeed"

# Runtime review defaults for CLI / webhook / worker.
# 留空表示：
# - review_packs: 使用默认 council（security / architecture / database）
# - review_advisor_route: 不启用 advisor second opinion
# - review_compare_reviewers: 不抓外部 reviewer comparison
# review_packs:
#   - security
#   - architecture
#   - database
# review_advisor_route: openai-gpt-5-4
# review_compare_reviewers:
#   - gitlab:coderabbit
#   - github:gemini

# 多 provider 路由工厂配置示例。
# 注意：默认本地开发仍然优先走上面的 ANTHROPIC_* / MINIMAX_* 兼容配置。
# 如果启用 llm.routes，请把对应 route 的 api_key/base_url/model 也在这里配完整。
#
# llm:
#   default_route: minimax-review
#   fallback_route: claude-sonnet-4-6
