# Default configuration for the MR review system.
# Environment variables override all values below.

app_env: development
port: "3100"

mysql_dsn: "mreviewer:mreviewer_password@tcp(127.0.0.1:3306)/mreviewer?parseTime=true&loc=UTC&charset=utf8mb4&collation=utf8mb4_unicode_ci"
redis_addr: "127.0.0.1:6380"

gitlab_base_url: "https://gitlab.example.com"
gitlab_token: ""
gitlab_webhook_secret: ""

# Optional runtime defaults for the portable review council:
# review:
#   packs:
#     - security
#     - architecture
#     - database
#   advisor_chain: advisor_primary
#   compare_reviewers:
#     - github:gemini
#     - gitlab:coderabbit

models:
  minimax_reasoning:
    provider: minimax
    base_url: ${MINIMAX_BASE_URL}
    api_key: ${MINIMAX_API_KEY}
    model: ${MINIMAX_MODEL}
    output_mode: tool_call
    max_tokens: 4096
    temperature: 0.2
  claude_backup:
    provider: anthropic
    base_url: ${ANTHROPIC_BASE_URL}
    api_key: ${ANTHROPIC_API_KEY}
    model: claude-sonnet-4-6
    output_mode: tool_call
    max_tokens: 12000
    temperature: 0.2
  openai_advisor:
    provider: openai
    base_url: ${OPENAI_BASE_URL}
    api_key: ${OPENAI_API_KEY}
    model: gpt-5.4
    output_mode: json_schema
    max_completion_tokens: 12000
    reasoning_effort: medium
    temperature: 0.2

model_chains:
  review_primary:
    primary: minimax_reasoning
    fallbacks:
      - claude_backup
  advisor_primary:
    primary: openai_advisor
    fallbacks:
      - claude_backup

review:
  model_chain: review_primary
  advisor_chain: advisor_primary
  packs:
    - security
    - architecture
    - database

